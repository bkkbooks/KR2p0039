body:
  text: 君子曰昔者君老太子朝君君之母弟是相太子側聽庶叩叩進太子前之母弟母弟送退前之太子再三然後並聽之太子母弟至命於閤門以告寺人寺人入告于君君曰召之太子入見如祭祀之事各敬爾司各恭爾事發命不斁君卒太子乃亡聞亡聽不聞不令唯哀悲是思唯邦之大務是敬
